<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Time Clock</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e9ecef;
      padding: 1.5rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .clock-card {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .clock-header {
      background: #0C447C;
      padding: 2rem 2rem 1.75rem;
      text-align: center;
    }

    .clock-header p {
      color: #B5D4F4;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    #watch {
      font-size: clamp(3rem, 12vw, 4.5rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      color: #ffffff;
      line-height: 1;
    }

    .ampm {
      font-size: 1.1rem;
      font-weight: 500;
      color: #85B7EB;
      margin-left: 8px;
      vertical-align: middle;
    }

    .analog-wrap {
      display: flex;
      justify-content: center;
      padding: 1.75rem 1.5rem 0;
    }

    canvas#face {
      border-radius: 50%;
      border: 1px solid #e0e5ee;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 1.5rem 1.5rem 0;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 1.25rem 1.5rem 1.75rem;
    }

    .meta-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }

    .meta-box .lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6c757d;
      margin-bottom: 4px;
    }

    .meta-box .val {
      font-size: 15px;
      font-weight: 600;
      color: #212529;
    }

    @media (max-width: 400px) {
      .clock-header { padding: 1.5rem 1rem 1.25rem; }
      .meta-row { padding: 1rem; gap: 8px; }
    }
  </style>
</head>
<body>

  <div class="clock-card">

    <div class="clock-header">
      <p>Your real time is</p>
      <h1 id="watch">00:00:00<span class="ampm" id="ampm"></span></h1>
    </div>

    <div class="analog-wrap">
      <canvas id="face" width="200" height="200"></canvas>
    </div>

    <hr class="divider">

    <div class="meta-row">
      <div class="meta-box">
        <div class="lbl">Day</div>
        <div class="val" id="m-day"></div>
      </div>
      <div class="meta-box">
        <div class="lbl">Date</div>
        <div class="val" id="m-date"></div>
      </div>
      <div class="meta-box">
        <div class="lbl">Month</div>
        <div class="val" id="m-month"></div>
      </div>
    </div>

  </div>

  <script src="indext.js"></script>
  <script>
    const canvas = document.getElementById('face');
    const ctx = canvas.getContext('2d');
    const size = 200, cx = 100, cy = 100, r = 90;

    function drawClock() {
      const now = new Date();
      const s = now.getSeconds();
      const m = now.getMinutes();
      const h = now.getHours();

      ctx.clearRect(0, 0, size, size);

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#f0f4fb';
      ctx.fill();
      ctx.strokeStyle = '#185FA5';
      ctx.lineWidth = 2;
      ctx.stroke();

      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const isMaj = i % 5 === 0;
        const outer = r - 4;
        const inner = isMaj ? r - 16 : r - 10;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * outer, cy + Math.sin(a) * outer);
        ctx.lineTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
        ctx.strokeStyle = isMaj ? '#185FA5' : '#c8d4e8';
        ctx.lineWidth = isMaj ? 2 : 1;
        ctx.stroke();
      }

      for (let i = 1; i <= 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        ctx.fillStyle = '#0C447C';
        ctx.font = '600 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i, cx + Math.cos(a) * (r - 26), cy + Math.sin(a) * (r - 26));
      }

      function hand(angle, length, width, color) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, length * 0.2);
        ctx.lineTo(0, -length);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.restore();
      }

      const hAngle = ((h % 12) / 12 + m / 720) * Math.PI * 2 - Math.PI / 2;
      const mAngle = (m / 60 + s / 3600) * Math.PI * 2 - Math.PI / 2;
      const sAngle = (s / 60) * Math.PI * 2 - Math.PI / 2;

      hand(hAngle, r * 0.52, 4, '#0C447C');
      hand(mAngle, r * 0.72, 2.5, '#185FA5');
      hand(sAngle, r * 0.80, 1.5, '#E24B4A');

      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#E24B4A';
      ctx.fill();

      const h12 = h % 12 || 12;
      const hh = String(h12).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      const ss = String(s).padStart(2, '0');

      document.getElementById('watch').childNodes[0].nodeValue = hh + ':' + mm + ':' + ss;
      document.getElementById('ampm').textContent = h >= 12 ? 'PM' : 'AM';

      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      document.getElementById('m-day').textContent = days[now.getDay()];
      document.getElementById('m-date').textContent = now.getDate();
      document.getElementById('m-month').textContent = months[now.getMonth()];
    }

    drawClock();
    setInterval(drawClock, 1000);
  </script>

</body>
</html>
